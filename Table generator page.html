<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NordicForms Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f2ef;
      --panel: #efedeb;
      --panel-2: #f7f5f2;
      --card: #faf8f5;
      --white: #ffffff;
      --text: #171717;
      --muted: #918981;
      --line: #e7e0d8;
      --accent: #a5672d;
      --accent-dark: #8f5520;
      --shadow: 0 16px 34px rgba(0, 0, 0, 0.06);
      --radius: 20px;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      display: block;
      width: 100%;
    }

    .container {
      width: min(1380px, calc(100% - 40px));
      margin: 0 auto;
    }

    .navbar {
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(6px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
    }

    .brand-mark {
      font-size: 15px;
    }

    .nav-links {
      display: flex;
      gap: 34px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6f6a64;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .login-btn {
      padding: 10px 22px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: 0.2s ease;
    }

    .login-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .profile-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #111;
      color: #fff;
      font-size: 14px;
      border: none;
    }

    .generator-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 82px);
    }

    .sidebar {
      background: #f1efec;
      border-right: 1px solid var(--line);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sidebar-scroll {
      display: flex;
      flex-direction: column;
      gap: 26px;
    }

    .sidebar-section-title {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #a79f97;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .control-group {
      margin-bottom: 18px;
    }

    .control-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 12px;
    }

    .control-top label {
      font-size: 14px;
      font-weight: 500;
      color: #3c3936;
    }

    .value-box {
      min-width: 42px;
      height: 22px;
      padding: 0 8px;
      border-radius: 7px;
      border: 1px solid var(--line);
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #7d746c;
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 2px;
      background: #d9d1c7;
      border-radius: 999px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px rgba(165, 103, 45, 0.25);
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #fff;
      cursor: pointer;
    }

    .assistant-box {
      margin-top: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
    }

    .assistant-top {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9b948c;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .assistant-text {
      font-size: 13px;
      color: #7d746c;
      font-style: italic;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .assistant-input {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .assistant-input input {
      border: none;
      outline: none;
      width: 100%;
      background: transparent;
      font-family: "Inter", sans-serif;
      font-size: 13px;
      color: var(--text);
    }

    .assistant-send {
      color: var(--accent);
      font-weight: 700;
      font-size: 16px;
    }

    .main-area {
      background: #ece9e4;
      padding: 26px 22px 28px;
      position: relative;
    }

    .product-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    .product-card {
      width: 230px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
      overflow: hidden;
    }

    .product-card-main {
      padding: 16px 16px 14px;
    }

    .product-name {
      font-family: "Playfair Display", serif;
      font-size: 28px;
      line-height: 1;
      margin-bottom: 4px;
    }

    .product-name span {
      font-family: "Inter", sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: #6d655d;
    }

    .product-sub {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }

    .product-meta {
      display: flex;
      gap: 8px;
      padding: 10px 12px 12px;
      border-top: 1px solid var(--line);
      background: #f6f3ee;
      flex-wrap: wrap;
    }

    .meta-pill {
      font-size: 10px;
      color: #7c736b;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 9px;
      font-weight: 600;
    }

    .viewer-wrap {
      position: relative;
      padding-right: 64px;
    }

    .viewer {
      background: #fff;
      border: 1px solid #e4ddd5;
      border-radius: 22px;
      box-shadow: var(--shadow);
      min-height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .viewer::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(0,0,0,0.02), transparent 52%);
      pointer-events: none;
    }

    .table-image {
      width: min(620px, 72%);
      object-fit: contain;
      filter: drop-shadow(0 18px 18px rgba(0,0,0,0.08));
    }

    .color-stack {
      position: absolute;
      right: 0;
      top: 10px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .color-swatch {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.06);
      cursor: pointer;
      position: relative;
      background: #fff;
    }

    .color-swatch.active::after {
      content: "";
      position: absolute;
      inset: -5px;
      border: 2px solid var(--accent);
      border-radius: 50%;
    }

    .swatch-1 { background: #ead9bf; }
    .swatch-2 { background: #9b6733; }
    .swatch-3 { background: #2d180f; }

    .viewer-tools {
      position: absolute;
      right: 0;
      bottom: 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tool-btn {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(255,255,255,0.8);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: #8e847b;
      font-size: 15px;
      backdrop-filter: blur(6px);
    }

    .bottom-controls {
      display: flex;
      justify-content: center;
      margin-top: 18px;
    }

    .controls-pill {
      display: inline-flex;
      align-items: center;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f7f4ef;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    .controls-pill button {
      border: none;
      background: transparent;
      padding: 14px 20px;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8b8279;
      cursor: pointer;
      font-weight: 600;
    }

    .controls-pill button + button {
      border-left: 1px solid var(--line);
    }

    @media (max-width: 1100px) {
      .generator-layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--line);
      }

      .viewer-wrap {
        padding-right: 0;
      }

      .color-stack {
        position: static;
        flex-direction: row;
        justify-content: flex-end;
        margin-bottom: 14px;
      }

      .viewer-tools {
        position: static;
        flex-direction: row;
        justify-content: flex-end;
        margin-top: 14px;
      }
    }

    @media (max-width: 760px) {
      .nav-links {
        display: none;
      }

      .product-head {
        flex-direction: column;
      }

      .product-card {
        width: 100%;
        max-width: 320px;
      }

      .viewer {
        min-height: 420px;
      }

      .table-image {
        width: 82%;
      }

      .container {
        width: min(100% - 24px, 1380px);
      }
    }
  </style>
</head>
<body>
  <header class="container navbar">
    <div class="brand">
      <span class="brand-mark">◌</span>
      <span>NordicForms</span>
    </div>

    <nav class="nav-links">
      <a href="Landing page.html">Home</a>
      <a href="Table generator page.html">Generator</a>
    </nav>

    <div class="nav-right">
      <a href="Login page.html" class="login-btn">Login</a>
      <button class="profile-btn" type="button">●</button>
    </div>
  </header>

  <main class="generator-layout">
    <aside class="sidebar">
      <div class="sidebar-scroll">
        <div>
          <div class="sidebar-section-title">Geometry</div>

          <div class="control-group">
            <div class="control-top">
              <label for="width">Width (cm)</label>
              <span class="value-box">180</span>
            </div>
            <input id="width" type="range" min="120" max="260" value="180" />
          </div>

          <div class="control-group">
            <div class="control-top">
              <label for="length">Length (cm)</label>
              <span class="value-box">90</span>
            </div>
            <input id="length" type="range" min="70" max="140" value="90" />
          </div>

          <div class="control-group">
            <div class="control-top">
              <label for="height">Height (cm)</label>
              <span class="value-box">75</span>
            </div>
            <input id="height" type="range" min="68" max="80" value="75" />
          </div>
        </div>

        <div>
          <div class="sidebar-section-title">Construction</div>

          <div class="control-group">
            <div class="control-top">
              <label for="top-thickness">Tabletop Thickness (mm)</label>
              <span class="value-box">40</span>
            </div>
            <input id="top-thickness" type="range" min="20" max="60" value="40" />
          </div>

          <div class="control-group">
            <div class="control-top">
              <label for="leg-width">Leg Width (cm)</label>
              <span class="value-box">8</span>
            </div>
            <input id="leg-width" type="range" min="5" max="14" value="8" />
          </div>
        </div>

        <div>
          <div class="sidebar-section-title">Offsets</div>

          <div class="control-group">
            <div class="control-top">
              <label for="top-inset">Top Inset (cm)</label>
              <span class="value-box">5</span>
            </div>
            <input id="top-inset" type="range" min="2" max="14" value="5" />
          </div>
        </div>
      </div>

      <div class="assistant-box">
        <div class="assistant-top">✦ Design Assistant</div>
        <div class="assistant-text">
          “Add a light oak finish and refine the leg taper.”
        </div>
        <div class="assistant-input">
          <input type="text" placeholder="Ask for modifications..." />
          <span class="assistant-send">➤</span>
        </div>
      </div>
    </aside>

    <section class="main-area">
      <div class="product-head">
        <div class="product-card">
          <div class="product-card-main">
            <div class="product-name">FJORD <span>S1 Series</span></div>
            <div class="product-sub">Light Oak Collection</div>
          </div>

          <div class="product-meta">
            <span class="meta-pill">180 × 90 × 75</span>
            <span class="meta-pill">42 kg</span>
          </div>
        </div>
      </div>

      <div class="viewer-wrap">
        <div class="color-stack">
          <button class="color-swatch swatch-1 active" aria-label="Light oak"></button>
          <button class="color-swatch swatch-2" aria-label="Walnut"></button>
          <button class="color-swatch swatch-3" aria-label="Dark oak"></button>
        </div>

        <div class="viewer">
          <img
            class="table-image"
            src="https://m.media-amazon.com/images/I/81-RA7H27JL._AC_SX679_.jpg"
            alt="Parametric dining table"
          />
        </div>

        <div class="viewer-tools">
          <button class="tool-btn" type="button">⌘</button>
          <button class="tool-btn" type="button">⌗</button>
          <button class="tool-btn" type="button">⤢</button>
        </div>
      </div>

      <div class="bottom-controls">
        <div class="controls-pill">
          <button type="button">Rotate</button>
          <button type="button">Zoom</button>
          <button type="button">Move</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
