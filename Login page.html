<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NordicForms Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f4f2ef;
      --section: #efedeb;
      --card: #faf8f5;
      --white: #ffffff;
      --text: #171717;
      --muted: #918981;
      --line: #e7e0d8;
      --accent: #a95b17;
      --accent-dark: #8c4b12;
      --shadow: 0 14px 30px rgba(0, 0, 0, 0.05);
      --radius: 20px;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
    }

    /* NAVBAR */
    .navbar {
      height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
    }

    .brand-mark {
      font-size: 15px;
      color: var(--text);
    }

    .nav-links {
      display: flex;
      gap: 34px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6f6a64;
    }

    .login-btn {
      padding: 10px 22px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* PAGE */
    .page {
      min-height: calc(100vh - 82px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 60px;
    }

    .login-card {
      width: 100%;
      max-width: 470px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-inner {
      padding: 42px 34px 28px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 26px;
    }

    .login-header h1 {
      font-family: "Playfair Display", serif;
      font-size: 36px;
      line-height: 1.05;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .login-header p {
      color: var(--muted);
      font-size: 14px;
    }

    .google-btn {
      width: 100%;
      height: 52px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .google-btn:hover {
      border-color: #d8cec3;
      transform: translateY(-1px);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 22px 0;
      color: #b2aaa2;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .form-group {
      margin-bottom: 18px;
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #8b837a;
      font-weight: 600;
    }

    .forgot {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
    }

    input {
      width: 100%;
      height: 52px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 0 16px;
      font-size: 14px;
      font-family: "Inter", sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input::placeholder {
      color: #c0b8b0;
    }

    input:focus {
      border-color: #d1b08f;
      box-shadow: 0 0 0 4px rgba(199, 154, 103, 0.12);
    }

    .signin-btn {
      width: 100%;
      height: 56px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s ease, transform 0.2s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .signin-btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .signup-text {
      text-align: center;
      margin-top: 22px;
      font-size: 13px;
      color: var(--muted);
    }

    .signup-text a {
      color: var(--accent);
      font-weight: 600;
    }

    .card-footer {
      height: 82px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-top: 1px solid var(--line);
    }

    .card-footer div:nth-child(1) { background: #e9e4de; }
    .card-footer div:nth-child(2) { background: #ddd9d3; }
    .card-footer div:nth-child(3) { background: #e4dfd9; }
    .card-footer div:nth-child(4) { background: #dad6d0; }

    @media (max-width: 980px) {
      .nav-links {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .container {
        width: min(100% - 28px, 1180px);
      }

      .page {
        padding: 32px 14px 40px;
      }

      .login-inner {
        padding: 32px 20px 24px;
      }

      .login-header h1 {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <header class="container navbar">
    <div class="brand">
      <span class="brand-mark">◌</span>
      <span>NordicForms</span>
    </div>

    <nav class="nav-links">
      <a href="Landing page.html">Home</a>
      <a href="Table generator page.html">Generator</a>
    </nav>

    <a href="Login page.html" class="login-btn">Login</a>
  </header>

  <main class="page">
    <div class="login-card">
      <div class="login-inner">
        <div class="login-header">
          <h1>Welcome Back</h1>
          <p>Design and deploy tables in minutes</p>
        </div>

        <button class="google-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12S17.4 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15 18.9 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34 6.1 29.3 4 24 4c-7.7 0-14.3 4.3-17.7 10.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.3l-6.3-5.2C29.3 35.1 26.8 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.5 16.2 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.3 5.5-6.3 7.1l6.3 5.2C39 36.9 44 31 44 24c0-1.3-.1-2.3-.4-3.5z"/>
          </svg>
          Continue with Google
        </button>

        <div class="divider">or</div>

        <form>
          <div class="form-group">
            <div class="label-row">
              <label for="email">Email Address</label>
            </div>
            <input
              type="email"
              id="email"
              placeholder="name@company.com"
            />
          </div>

          <div class="form-group">
            <div class="label-row">
              <label for="password">Password</label>
              <a href="#" class="forgot">Forgot password?</a>
            </div>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
            />
          </div>

          <a href="Table generator page.html" class="signin-btn">Sign In →</a>
        </form>

        <p class="signup-text">
          Don’t have an account? <a href="#">Create an account</a>
        </p>
      </div>

      <div class="card-footer">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>
  </main>
</body>
</html>
